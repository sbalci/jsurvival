---
name:  multisurvival
title: Multivariable Survival Analysis
menuGroup: Survival
menuSubgroup: ClinicoPath Survival
menuSubtitle: 'Multivariable Cox-regression, Adjusted Survival'
version: '1.0.1'
jas: '1.2'

description:
    main: >-
        Performs multivariable survival analysis using Cox proportional hazards regression.
        In multivariable survival analysis, person-time follow-up is crucial for properly adjusting
        for covariates while accounting for varying observation periods. The Cox proportional hazards
        model incorporates person-time by modeling the hazard function, which represents the instantaneous
        event rate per unit of person-time. When stratifying analyses or examining multiple predictors,
        the model accounts for how these factors influence event rates relative to the person-time at
        risk in each subgroup.
        
#     R:
#         dontrun: true
#         usage: |
#             # Example 1: Basic multivariable Cox regression
#             library(survival)
#             data(colon)
#             
#             multisurvival(
#                 data = colon,
#                 elapsedtime = "time",
#                 outcome = "status",
#                 outcomeLevel = "1",
#                 explanatory = c("sex", "obstruct", "perfor"),
#                 contexpl = c("age", "nodes"),
#                 timetypeoutput = "days",
#                 hr = TRUE  # Show hazard ratio plot
#             )
#             
#             # Example 2: Using dates to calculate survival time
#             # Assuming you have diagnosis and follow-up dates
#             multisurvival(
#                 data = mydata,
#                 tint = TRUE,
#                 dxdate = "diagnosis_date",
#                 fudate = "last_followup_date", 
#                 timetypedata = "ymd",
#                 timetypeoutput = "months",
#                 outcome = "vital_status",
#                 outcomeLevel = "Dead",
#                 explanatory = c("stage", "grade"),
#                 contexpl = "age"
#             )
#             
#             # Example 3: Risk stratification analysis
#             multisurvival(
#                 data = colon,
#                 elapsedtime = "time",
#                 outcome = "status",
#                 outcomeLevel = "1",
#                 explanatory = c("sex", "obstruct"),
#                 contexpl = c("age", "nodes"),
#                 calculateRiskScore = TRUE,
#                 numRiskGroups = "three",
#                 plotRiskGroups = TRUE,
#                 addRiskScore = TRUE,  # Add risk score to data
#                 addRiskGroup = TRUE   # Add risk group to data
#             )
#             
#             # Example 4: Model with stratification for non-proportional hazards
#             multisurvival(
#                 data = colon,
#                 elapsedtime = "time",
#                 outcome = "status",
#                 outcomeLevel = "1",
#                 explanatory = c("obstruct", "perfor"),
#                 contexpl = c("age", "nodes"),
#                 use_stratify = TRUE,
#                 stratvar = "sex",  # Stratify by sex if PH assumption violated
#                 ph_cox = TRUE      # Test proportional hazards assumption
#             )
#             
#             # Example 5: Stepwise model selection
#             # multisurvival(
#             #     data = colon,
#             #     elapsedtime = "time",
#             #     outcome = "status",
#             #     outcomeLevel = "1",
#             #     explanatory = c("sex", "obstruct", "perfor", "adhere"),
#             #     contexpl = c("age", "nodes"),
#             #     use_modelSelection = TRUE,
#             #     modelSelection = "both",  # Stepwise selection
#             #     selectionCriteria = "aic",
#             #     pEntry = 0.05,
#             #     pRemoval = 0.10
#             # )
#             
#             # Example 6: Person-time analysis
#             multisurvival(
#                 data = colon,
#                 elapsedtime = "time",
#                 outcome = "status",
#                 outcomeLevel = "1",
#                 explanatory = "sex",
#                 contexpl = "age",
#                 person_time = TRUE,
#                 time_intervals = "180, 365, 730",  # 6mo, 1yr, 2yr
#                 rate_multiplier = 1000  # Rate per 1000 person-days
#             )


options:

# Data ----

    - name: data
      type: Data
      description:
          R: >
            The dataset to be analyzed, provided as a data frame. Must contain the
            variables specified in the options below.

# Time ----



    - name: elapsedtime
      title: 'Time Elapsed'
      type: Variable
      suggested: [ continuous ]
      permitted: [ numeric ]
      default: null
      description:
        R: >
          The numeric variable representing follow-up time until the event or last observation.
          If `tint` = false, this should be a pre-calculated numeric time variable.
          If `tint` = true, `dxdate` and `fudate` will be used to calculate this time.

    - name: tint
      title: Using dates to calculate survival time
      type: Bool
      default: false
      description:
        R: >
          If true, survival time will be calculated from `dxdate` and `fudate`.
          If false, `elapsedtime` should be provided as a pre-calculated numeric variable.

    - name: dxdate
      title: 'Diagnosis Date'
      type: Variable
      default: null
      suggested: [ continuous, nominal ]
      permitted: [ numeric, factor ]
      description:
        R: >
          Date of diagnosis. Required if `tint` = true. Accepts: (1) Date/datetime text,
          (2) Numeric Unix epoch seconds (from DateTime Converter's corrected_datetime_numeric output),
          (3) Numeric datetime values from R. Time intervals calculated as difference from follow-up date.

    - name: fudate
      title: 'Follow-up Date'
      type: Variable
      default: null
      suggested: [ continuous, nominal ]
      permitted: [ numeric, factor ]
      description:
        R: >
          Follow-up date or date of last observation. Required if `tint` = true. Accepts:
          (1) Date/datetime text, (2) Numeric Unix epoch seconds (from DateTime Converter's
          corrected_datetime_numeric output), (3) Numeric datetime values from R. Must be in
          same format as diagnosis date.




    - name: timetypedata
      title: 'Time Type in Data (e.g., YYYY-MM-DD)'
      type: List
      options:
        - title: 'Year-Month-Day Hour-Minute-Second'
          name: ymdhms
        - title: 'Year-Month-Day'
          name: ymd
        - title: 'Year-Day-Month'
          name: ydm
        - title: 'Month-Day-Year'
          name: mdy
        - title: 'Month-Year-Day'
          name: myd
        - title: 'Day-Month-Year'
          name: dmy
        - title: 'Day-Year-Month'
          name: dym
      default: ymd
      description:
        R: >
          Specifies the format of the date variables in the input data.
          This is critical if `tint = true`, as `dxdate` and `fudate` will be parsed
          according to this format to calculate survival time. For example, if your
          data files record dates as "YYYY-MM-DD", select `ymd`.

    - name: timetypeoutput
      title: Time Type in Output
      type: List
      options:
        - title: days
          name: days
        - title: weeks
          name: weeks
        - title: months
          name: months
        - title: years
          name: years
      default: months
      description:
        R: >
          The units in which survival time is reported in the output. Choose from days, weeks,
          months, or years.

    - name: uselandmark
      title: Use landmark time
      type: Bool
      default: false
      description:
        R: >
          If true, applies a landmark analysis starting at a specified time point.

    - name: landmark
      title: Landmark Time
      type: Integer
      default: 3
      description:
        R: >
          The time point (in the units defined by `timetypeoutput`) at which to start landmark analyses.
          Only used if `uselandmark` = true.


    - name: calculatedtime
      title: Add Calculated Time to Data
      type: Output
      description:
        R: >
          If true, adds a calculated survival time variable to the dataset, based on `dxdate` and `fudate`
          if `tint` = true, or confirms `elapsedtime` if already provided.



# Outcome ----



    - name: outcome
      title: 'Outcome'
      type: Variable
      suggested: [ ordinal, nominal, continuous ]
      permitted: [ factor, numeric ]
      default: null
      description:
        R: >
          The outcome variable. Typically indicates event status (e.g., death, recurrence).
          For survival analysis, this may be a factor or numeric event indicator.

    - name: outcomeLevel
      title: Event Level
      type: Level
      variable: (outcome)
      allowNone: true
      description:
        R: >
          The level of `outcome` considered as the event. For example, if `outcome` is a factor,
          specify which level indicates the event occurrence.

    - name: dod
      title: Dead of Disease
      type: Level
      variable: (outcome)
      allowNone: true
      description:
        R: >
          The level of `outcome` corresponding to death due to disease, if applicable.

    - name: dooc
      title: Dead of Other
      type: Level
      variable: (outcome)
      allowNone: true
      description:
        R: >
          The level of `outcome` corresponding to death due to other causes, if applicable.

    - name: awd
      title: Alive w Disease
      type: Level
      variable: (outcome)
      allowNone: true
      description:
        R: >
          The level of `outcome` corresponding to alive with disease, if applicable.

    - name: awod
      title: Alive w/o Disease
      type: Level
      variable: (outcome)
      allowNone: true
      description:
        R: >
          The level of `outcome` corresponding to alive without disease, if applicable.


    - name: analysistype
      title: 'Survival Type'
      type: List
      options:
        - title: Overall
          name: overall
        - title: Cause Specific
          name: cause
        - title: Competing Risk
          name: compete
      default: overall
      description:
        R: >
          Type of survival analysis:
          - overall: All-cause survival
          - cause: Cause-specific survival
          - compete: Competing risks analysis



    - name: outcomeredefined
      title: Add Redefined Outcome to Data
      type: Output
      description:
        R: >
          If true, adds a new outcome variable (redefined based on the chosen event specification)
          to the data set.

# Explanatory ----

    - name: explanatory
      title: Explanatory Variables
      type: Variables
      suggested: [ ordinal, nominal ]
      permitted: [ factor ]
      default: null
      description:
        R: >
          Categorical explanatory (predictor) variables included in the Cox model.

# Cont Explanatory ----

    - name: contexpl
      title: Continuous Explanatory Variable
      type: Variables
      suggested: [ continuous ]
      permitted: [ numeric ]
      default: null
      description:
        R: >
          Continuous explanatory (predictor) variables included in the Cox model.


# Interactions ----

    - name: interactions
      title: Interaction Terms
      type: Terms
      default:
      description:
        R: >
          Interaction (crossed) terms added to the Cox model, built from
          variables already selected as explanatory or continuous explanatory
          variables. Each term tests effect modification - e.g. Treatment x
          Biomarker for predictive-biomarker analysis. For a 2-way term the
          first variable is the focal effect and the second is the moderator.

# Multievent ----

    - name: multievent
      title: Multiple event levels
      type: Bool
      default: false
      description:
        R: >
          If true, multiple event levels will be considered for competing risks analysis.
          Requires specifying `dod`, `dooc`, etc.


# Plots ----

    - name: hr
      title: Hazards regression plot
      type: Bool
      default: false
      description:
        R: >
          If true, generates a plot of hazard ratios for each explanatory variable in the Cox model.

    - name: sty
      title: Plot Style
      type: List
      options:
        - title: finalfit
          name: t1
        # - title: ggstatsplot
        #   name: t2
        - title: survminer forestplot
          name: t3
      default: t1
      description:
        R: >
          The style of the hazard ratio (forest) plot. "finalfit" or "survminer forestplot".


    - name: ph_cox
      title: Proportional hazards assumption
      type: Bool
      default: true
      description:
        R: >
          If true, tests the proportional hazards assumption for the Cox model
          using survival::cox.zph and surfaces global + per-covariate
          Schoenfeld residual statistics. REMARK reporting recommends this be
          reported for any Cox-based prognostic study. Disable only to suppress
          the diagnostic when not needed.



    - name: km
      title: Kaplan-Meier
      type: Bool
      default: false
      description:
        R: >
          If true, produces a Kaplan-Meier survival plot. Useful for visualization of
          survival functions without covariate adjustment.

# Plot Options ----




    - name: endplot
      title: Plot End Time
      type: Integer
      default: 60
      description:
        R: >
          The maximum follow-up time (in units defined by `timetypeoutput`) to display on survival plots.


    - name: byplot
      title: Time Interval
      type: Integer
      default: 12
      description:
        R: >
          The interval (in units defined by `timetypeoutput`) at which time points or labels are shown on plots.


    - name: ci95
      title: '95 percent CI'
      type: Bool
      default: false
      description:
        R: >
          If true, displays 95 percent confidence intervals around the survival estimates on plots.

    - name: risktable
      title: Risktable
      type: Bool
      default: false
      description:
        R: >
          If true, displays the number of subjects at risk at each time point below the survival plot.

    - name: censored
      title: Censored
      type: Bool
      default: false
      description:
        R: >
          If true, marks censored observations (e.g., using tick marks) on the survival plot.

    - name: medianline
      title: medianline
      type: List
      options:
        - title: none
          name: none
        - title: horizontal
          name: h
        - title: vertical
          name: v
        - title: both
          name: hv
      default: none
      description:
        R: >
          If true, displays a line indicating the median survival time on the survival plot.


    - name: pplot
      title: p-value
      type: Bool
      default: false
      description:
        R: >
          If true, displays the p-value from the survival comparison test on the survival plot.



    - name: cutp
      title: Cutpoints
      type: String
      default: '12, 36, 60'





# Risk Score ----

    - name: calculateRiskScore
      title: Calculate risk score
      type: Bool
      default: false
      description:
        R: >
          If true, calculates a risk score from the Cox model coefficients for each individual.


    - name: numRiskGroups
      title: Number of Risk Groups
      type: List
      options:
        - title: Two Groups
          name: two
        - title: Three Groups
          name: three
        - title: Four Groups
          name: four
      default: four
      description: >-
        Select the number of risk groups to create from the risk scores.
        The data will be divided into equal quantiles based on this selection.


    - name: plotRiskGroups
      title: Plot risk group survival
      type: Bool
      default: false
      description:
        R: >
          If true, stratifies individuals into risk groups based on their calculated risk scores
          and plots their survival curves.

    - name: ci_optimism
      title: Optimism-corrected C-index (bootstrap)
      type: Bool
      default: false
      description:
        R: >
          If true, computes a bootstrap optimism-corrected Harrell's C-index
          (apparent, optimism, and corrected) to quantify overfitting of the
          Cox model's discrimination. Not available for competing-risks
          (Fine-Gray) models.

    - name: ci_optimism_boot
      title: Bootstrap resamples (optimism)
      type: Integer
      default: 150
      min: 20
      max: 2000
      description:
        R: >
          Number of bootstrap resamples used for optimism correction of the
          C-index. Larger values give more stable estimates but take longer to
          compute.

    - name: addRiskScore
      title: Add Risk Score to Data
      type: Output
      description:
        R: >
          If true, adds a computed risk score variable to the dataset.


    - name: addRiskGroup
      title: Add Risk Group to Data
      type: Output
      description:
        R: >
          If true, adds a categorical variable indicating risk group assignment to the dataset.


# Adjusted Survival ----

    - name: ac
      title: Adjusted survival curve
      type: Bool
      default: false

    - name: adjexplanatory
      title: Variable for Adjusted Curve
      type: Variable
      suggested: [ ordinal, nominal ]
      permitted: [ factor ]
      default: null

    - name: ac_method
      title: Adjustment Method
      type: List
      options:
        - title: Average
          name: average
        - title: Conditional Mean
          name: conditional
        - title: Single
          name: single
        - title: Marginal
          name: marginal
      default: average
      description:
          R: Method for computing adjusted survival curves

    - name: ac_summary
      title: Adjusted survival summary tables
      type: Bool
      default: false
      description:
          R: >
            Display numeric adjusted-survival outputs (survival at the cutpoint
            timepoints with 95% CI, adjusted median survival, and the adjusted
            Cox hazard-ratio table) in addition to the adjusted-survival curve.

    # ac_timepoints intentionally not exposed: the adjusted-survival tables reuse
    # the existing `cutp` option for their timepoints.

    # ac_compare (pairwise comparison of adjusted curves) intentionally not
    # revived: the shelved .adjustedPairwise() implementation performed an
    # UNADJUSTED log-rank test (survdiff) on model-name strings, which is both a
    # runtime bug and statistically mislabeled. A correct covariate-adjusted
    # pairwise contrast would need to be authored on the Cox model, not wired.


# Nomogram ----

    - name: showNomogram
      title: Nomogram
      type: Bool
      default: false



# Reduced Explanatory ----

    # reduced_explanatory intentionally not exposed: the covariate-contribution
    # table (compare_models) uses single-term deletion (drop1) on the fitted
    # model, so no separate reduced-model variable selection is required.

    - name: compare_models
      title: Covariate contribution (single-term deletion)
      type: Bool
      default: false
      description:
        R: >
          If true, reports a likelihood-ratio test and AIC for dropping each
          covariate from the full model (base R drop1). Shows which covariates
          significantly improve model fit.


