    - name: person_time
      title: "Calculate person-time metrics"
      type: Bool
      default: false
      description: >-
        Enable this option to calculate and display person-time metrics, including
        total follow-up time and incidence rates. These metrics help quantify the
        rate of events per unit of time in your study population.

    - name: time_intervals
      title: "Time Interval Stratification"
      type: String
      default: '12, 36, 60'
      description: >-
        Specify time intervals for stratified person-time analysis. Enter a 
        comma-separated list of time points to create intervals. For example, 
        "12, 36, 60" will create intervals 0-12, 12-36, 36-60, and 60+.

    - name: rate_multiplier
      title: "Rate Multiplier"
      type: Integer
      default: 100
      description: >-
        Specify the multiplier for incidence rates (e.g., 100 for rates per 100 person-years,
        1000 for rates per 1000 person-years).

# SurvMetrics - Enhanced Model Performance Metrics ----
# COMMENTED OUT - Corresponding UI elements commented out in multisurvival.u.yaml

    - name: show_survmetrics
      title: "Model performance metrics"
      type: Bool
      default: false
      description:
        R: >
          Report model performance metrics for the Cox model: Harrell's
          concordance (C-index), inverse-probability-of-censoring-weighted (IPCW)
          Brier score and time-dependent AUC at the chosen timepoints, and the
          Integrated Brier Score. Computed with the riskRegression package.

    - name: survmetrics_timepoints
      title: "Timepoints for Brier / AUC"
      type: String
      default: '12, 24, 36, 60'
      description:
        R: >
          Comma-separated timepoints at which to report the Brier score and
          time-dependent AUC. Timepoints beyond the observed follow-up are
          ignored. Should correspond to clinically meaningful follow-up times.

    # survmetrics_ibs_points intentionally not exposed: the Integrated Brier
    # Score is computed by riskRegression over the requested timepoint range,
    # so no separate grid-size option is needed.

    - name: survmetrics_show_plots
      title: "Brier score over time plot"
      type: Bool
      default: false
      description:
        R: >
          Display a plot of the IPCW Brier score across follow-up time.

